<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理员登录 - 三角洲账号租赁</title>
  <link rel="stylesheet" href="assets/styles.css">
  <style>
    body { background: #f3f4f6; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .login-container { background: #fff; padding: 32px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    .login-header { text-align: center; margin-bottom: 24px; }
    .login-header h1 { font-size: 24px; color: #1f2937; margin: 0 0 8px 0; }
    .login-header p { color: #6b7280; margin: 0; font-size: 14px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 14px; color: #374151; margin-bottom: 6px; font-weight: 500; }
    .form-group input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
    .form-group input:focus { outline: none; border-color: #3b82f6; ring: 2px; }
    .btn { width: 100%; padding: 12px; background: #3b82f6; color: #fff; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: 500; }
    .btn:hover { background: #2563eb; }
    .btn:disabled { background: #9ca3af; cursor: not-allowed; }
    .error-message { background: #fee2e2; color: #991b1b; padding: 10px 12px; border-radius: 6px; font-size: 14px; margin-bottom: 16px; display: none; }
    .back-link { text-align: center; margin-top: 16px; }
    .back-link a { color: #3b82f6; text-decoration: none; font-size: 14px; }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>管理员登录</h1>
      <p>请输入管理员账号密码</p>
    </div>
    <div id="errorMessage" class="error-message"></div>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" name="username" required placeholder="请输入管理员用户名">
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" required placeholder="请输入管理员密码">
      </div>
      <button type="submit" class="btn" id="loginBtn">登录</button>
    </form>
    <div class="back-link">
      <a href="index.html">返回首页</a>
    </div>
  </div>

  <script>
    const API_BASE = '';

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const errorMessage = document.getElementById('errorMessage');
      const loginBtn = document.getElementById('loginBtn');
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      errorMessage.style.display = 'none';
      loginBtn.disabled = true;
      loginBtn.textContent = '登录中...';
      
      try {
        const response = await fetch(`${API_BASE}/api/admin/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
          localStorage.setItem('admin_token', data.token);
          window.location.href = 'admin.html';
        } else {
          errorMessage.textContent = data.error || '登录失败';
          errorMessage.style.display = 'block';
        }
      } catch (err) {
        errorMessage.textContent = '网络错误，请稍后重试';
        errorMessage.style.display = 'block';
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = '登录';
      }
    });
  </script>
</body>
</html>

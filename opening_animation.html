<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>三角洲账号租赁 | 开场动画</title>
  <link rel="stylesheet" href="assets/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    /* 开场动画样式 */
    #intro-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      z-index: 10000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    #intro-overlay.hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease;
    }

    .intro-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 粒子背景 */
    .particle-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #00FF88;
      border-radius: 50%;
      opacity: 0;
    }

    /* 网格背景 */
    .grid-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      opacity: 0;
    }

    /* 猎鹰鸟窝 */
    .falcon-nest {
      position: absolute;
      width: 200px;
      height: 200px;
      opacity: 0;
      transform: scale(0.5);
    }

    .nest-ring {
      position: absolute;
      border: 3px solid #00FF88;
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.5), inset 0 0 20px rgba(0, 255, 136, 0.2);
    }

    .nest-ring:nth-child(1) {
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }

    .nest-ring:nth-child(2) {
      width: 70%;
      height: 70%;
      top: 15%;
      left: 15%;
      border-style: dashed;
      animation: rotate 20s linear infinite;
    }

    .nest-ring:nth-child(3) {
      width: 40%;
      height: 40%;
      top: 30%;
      left: 30%;
      border-color: rgba(0, 255, 136, 0.5);
    }

    .nest-core {
      position: absolute;
      width: 30%;
      height: 30%;
      top: 35%;
      left: 35%;
      background: radial-gradient(circle, rgba(0, 255, 136, 0.8) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.2); opacity: 1; }
    }

    /* 机械爪 */
    .mechanical-claw {
      position: absolute;
      width: 80px;
      height: 120px;
      opacity: 0;
      transform: translateY(50px);
    }

    .claw-arm {
      position: absolute;
      width: 12px;
      height: 60px;
      background: linear-gradient(to bottom, #1a1a1a, #333, #1a1a1a);
      border-radius: 6px;
    }

    .claw-arm::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 136, 0.3), transparent);
    }

    .claw-arm.left {
      left: 10px;
      transform: rotate(25deg);
      transform-origin: top center;
    }

    .claw-arm.right {
      right: 10px;
      transform: rotate(-25deg);
      transform-origin: top center;
    }

    .claw-arm.center {
      left: 34px;
      height: 50px;
    }

    .claw-joint {
      position: absolute;
      bottom: 0;
      width: 40px;
      height: 20px;
      background: #222;
      border-radius: 0 0 20px 20px;
      border: 2px solid #00FF88;
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
    }

    /* 非洲之星宝石 */
    .diamond {
      position: absolute;
      width: 80px;
      height: 80px;
      opacity: 0;
      transform: scale(0);
    }

    .diamond-shape {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .diamond-top {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 40px solid transparent;
      border-right: 40px solid transparent;
      border-bottom: 30px solid #00FF88;
      filter: drop-shadow(0 0 10px rgba(0, 255, 136, 0.8));
    }

    .diamond-middle {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 70px;
      height: 25px;
      background: linear-gradient(180deg, #00FF88, #00CC6A);
      clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
      filter: drop-shadow(0 0 15px rgba(0, 255, 136, 0.8));
    }

    .diamond-bottom {
      position: absolute;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 35px solid transparent;
      border-right: 35px solid transparent;
      border-top: 30px solid #008844;
      filter: drop-shadow(0 0 10px rgba(0, 255, 136, 0.6));
    }

    .diamond-shine {
      position: absolute;
      top: 10px;
      left: 20px;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      opacity: 0.8;
      filter: blur(5px);
    }

    .diamond-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, rgba(0, 255, 136, 0.4) 0%, transparent 70%);
      animation: glowPulse 1.5s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
    }

    /* 品牌图标 */
    .brand-logo {
      position: absolute;
      width: 200px;
      height: 80px;
      opacity: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .brand-logo img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 20px rgba(0, 255, 136, 0.8));
    }

    /* 文字标题 */
    .intro-text {
      position: absolute;
      bottom: 15%;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Microsoft YaHei', sans-serif;
      font-size: 24px;
      color: #00FF88;
      letter-spacing: 8px;
      text-transform: uppercase;
      opacity: 0;
      text-shadow: 0 0 30px rgba(0, 255, 136, 0.8);
    }

    /* 扫描线效果 */
    .scan-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00FF88, transparent);
      opacity: 0;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .falcon-nest {
        width: 150px;
        height: 150px;
      }

      .diamond {
        width: 60px;
        height: 60px;
      }

      .diamond-top {
        border-left-width: 30px;
        border-right-width: 30px;
        border-bottom-width: 22px;
      }

      .diamond-middle {
        width: 50px;
        height: 20px;
        top: 22px;
      }

      .diamond-bottom {
        top: 38px;
        border-left-width: 25px;
        border-right-width: 25px;
        border-top-width: 22px;
      }

      .brand-logo {
        width: 150px;
        height: 60px;
      }

      .intro-text {
        font-size: 16px;
        letter-spacing: 4px;
      }
    }
  </style>
</head>
<body>
  <!-- 开场动画容器 -->
  <div id="intro-overlay">
    <div class="intro-container">
      <!-- 粒子背景 -->
      <div class="particle-bg" id="particleBg"></div>
      <!-- 网格背景 -->
      <div class="grid-bg" id="gridBg"></div>
      <!-- 扫描线 -->
      <div class="scan-line" id="scanLine"></div>

      <!-- 猎鹰鸟窝 -->
      <div class="falcon-nest" id="falconNest">
        <div class="nest-ring"></div>
        <div class="nest-ring"></div>
        <div class="nest-ring"></div>
        <div class="nest-core"></div>
      </div>

      <!-- 机械爪 -->
      <div class="mechanical-claw" id="mechanicalClaw">
        <div class="claw-arm left"></div>
        <div class="claw-arm center"></div>
        <div class="claw-arm right"></div>
        <div class="claw-joint"></div>
      </div>

      <!-- 非洲之星宝石 -->
      <div class="diamond" id="diamond">
        <div class="diamond-glow"></div>
        <div class="diamond-shape">
          <div class="diamond-top"></div>
          <div class="diamond-middle"></div>
          <div class="diamond-bottom"></div>
          <div class="diamond-shine"></div>
        </div>
      </div>

      <!-- 品牌图标 - 替换位置 -->
      <div class="brand-logo" id="brandLogo">
        <!-- 请将您的品牌图片路径替换 src 中的内容 -->
        <img src="figure.jpg" alt="品牌Logo" id="logoImg">
      </div>

      <!-- 文字标题 -->
      <div class="intro-text" id="introText">三角洲账号租赁</div>
    </div>
  </div>

  <script>
    // 创建粒子
    function createParticles() {
      const particleBg = document.getElementById('particleBg');
      for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 2 + 's';
        particleBg.appendChild(particle);
      }
    }

    // 动画序列
    function playIntroAnimation() {
      const tl = gsap.timeline();
      const diamond = document.getElementById('diamond');
      const falconNest = document.getElementById('falconNest');
      const mechanicalClaw = document.getElementById('mechanicalClaw');
      const brandLogo = document.getElementById('brandLogo');
      const introText = document.getElementById('introText');
      const overlay = document.getElementById('intro-overlay');
      const gridBg = document.getElementById('gridBg');
      const scanLine = document.getElementById('scanLine');

      // 步骤1: 全屏黑屏淡入 (开始时已经是黑屏)
      tl.set('#intro-overlay', { opacity: 1 });

      // 步骤2: 网格背景和粒子浮现
      tl.to('#particleBg .particle', {
        opacity: 0.8,
        duration: 1,
        stagger: 0.02,
        ease: 'power2.out'
      }, 0.3);

      tl.to(gridBg, {
        opacity: 1,
        duration: 1.5,
        ease: 'power2.out'
      }, 0.5);

      // 扫描线效果
      tl.to(scanLine, {
        opacity: 0.8,
        duration: 0.5
      }, 1);

      tl.to(scanLine, {
        top: '100%',
        duration: 2,
        ease: 'power1.inOut'
      }, 1.2);

      // 步骤3: 猎鹰鸟窝浮现
      tl.to(falconNest, {
        opacity: 1,
        scale: 1,
        duration: 1.5,
        ease: 'back.out(1.7)'
      }, 1);

      // 步骤4: 机械爪伸出
      tl.to(mechanicalClaw, {
        opacity: 1,
        y: 0,
        duration: 1.2,
        ease: 'power3.out'
      }, 2.5);

      // 机械爪抓取动作
      tl.to('.claw-arm.left', {
        rotation: 35,
        duration: 0.3,
        ease: 'power2.out'
      }, 3.5);

      tl.to('.claw-arm.right', {
        rotation: -35,
        duration: 0.3,
        ease: 'power2.out'
      }, 3.5);

      // 步骤5: 宝石出现 (从爪子中浮现)
      tl.set(diamond, { x: 60, y: -20 });

      tl.to(diamond, {
        opacity: 1,
        scale: 1,
        duration: 0.8,
        ease: 'back.out(2)'
      }, 3.8);

      // 机械爪收回
      tl.to(mechanicalClaw, {
        y: 80,
        opacity: 0,
        duration: 0.8,
        ease: 'power2.in'
      }, 4.2);

      // 猎鹰鸟窝淡出
      tl.to(falconNest, {
        opacity: 0,
        scale: 0.5,
        duration: 0.8,
        ease: 'power2.in'
      }, 4.5);

      // 步骤6: 宝石悬浮、旋转、光芒闪烁
      tl.to(diamond, {
        x: 0,
        y: 0,
        rotation: 360,
        duration: 3,
        ease: 'power1.inOut'
      }, 5);

      // 宝石光芒脉动
      tl.to('.diamond-glow', {
        scale: 1.5,
        opacity: 0.5,
        duration: 0.8,
        repeat: 3,
        yoyo: true,
        ease: 'power1.inOut'
      }, 5);

      // 步骤7: 宝石变形为品牌图标
      tl.to(diamond, {
        opacity: 0,
        scale: 0.3,
        duration: 0.8,
        ease: 'power2.in'
      }, 8);

      tl.to(brandLogo, {
        opacity: 1,
        scale: 1.2,
        duration: 0.8,
        ease: 'power2.out'
      }, 8.3);

      tl.to(brandLogo, {
        scale: 1,
        duration: 0.5,
        ease: 'power1.inOut'
      }, 9);

      // 文字标题出现
      tl.to(introText, {
        opacity: 1,
        y: -10,
        duration: 1,
        ease: 'power2.out'
      }, 9.5);

      // 步骤8: 定格2秒后淡出
      tl.to(overlay, {
        opacity: 0,
        duration: 1.5,
        ease: 'power2.inOut',
        delay: 2,
        onComplete: function() {
          // 动画完全结束后移除遮罩
          overlay.style.display = 'none';
          // 显示主内容
          document.body.style.overflow = 'auto';
        }
      });

      // 阻止页面滚动直到动画结束
      document.body.style.overflow = 'hidden';

      return tl;
    }

    // 页面加载完成后播放动画
    window.addEventListener('load', function() {
      createParticles();
      playIntroAnimation();
    });

    // 也可以手动调用: playIntroAnimation()
  </script>
</body>
</html>
